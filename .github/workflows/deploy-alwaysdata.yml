name: Build and Deploy to AlwaysData

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'

env:
  NODE_VERSION: '23'

jobs:
  build:
    name: Build (Nuxt/Nitro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Build
        run: npm run build

#      - name: Prepare artifacts
#        run: |
#          mkdir -p artifact
#          # Nitro output (SSR node-server)
#          cp -r .output/* artifact
#          # Package files for prod install on server (for migrations or any runtime deps)
#          cp package.json artifact/package.json
#          if [ -f package-lock.json ]; then cp package-lock.json artifact/package-lock.json; fi
#          cd artifact && npm ci --production --no-audit --no-fund

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: '.output'

  deploy:
    name: Deploy to AlwaysData (SSH)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Debug artifact contents
        run: |
          echo "Listing downloaded artifact contents"
          ls -laR build || true

      - name: Copy files to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # Copy the built artifact folder contents
          source: build
          target: ${{ secrets.REMOTE_PATH }}
          # Strip both the leading 'build' and 'artifact' directories
          strip_components: 1
          rm: true

  restart:
    name: Restart application
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      ALWAYSDATA_TOKEN: ${{ secrets.ALWAYSDATA_TOKEN }}
      ALWAYSDATA_USER: ${{ secrets.ALWAYSDATA_USER }}
      ALWAYSDATA_SITE_ID: ${{ secrets.ALWAYSDATA_SITE_ID }}
    steps:
     - name: restart application
       if: ${{ env.ALWAYSDATA_TOKEN != '' }}
       run: |
          err=$(curl -X POST --basic --user "${{env.ALWAYSDATA_TOKEN}} account=${{env.ALWAYSDATA_USER}}:" https://api.alwaysdata.com/v1/site/${{env.ALWAYSDATA_SITE_ID}}/restart/ &>2);
          if [[ "${err}" -eq "" ]]; then 
            echo "Redémarrage OK"
          else
            echo "Erreur : ${err}"
          fi